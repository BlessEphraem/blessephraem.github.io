<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ephraem | Vidéos</title>

    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        .videos-page {
            padding-top: 120px;
            min-height: 100vh;
        }

        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .video-item {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            background: transparent;
            border: none;
            box-shadow: none;
            transition: transform 0.3s ease;
        }

        .video-item:hover {
            transform: translateY(-5px);
        }

        .video-item iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 50px;
            flex-wrap: wrap;
        }

        .pagination button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #fff;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            transition: background 0.2s ease, border-color 0.2s ease;
            min-width: 38px;
        }

        .pagination button:hover {
            background: rgba(255, 23, 150, 0.15);
            border-color: #ff1796;
        }

        .pagination button.active {
            background: #ff1796;
            border-color: #ff1796;
            font-weight: 700;
        }

        .pagination button:disabled {
            opacity: 0.3;
            cursor: default;
        }

        .pagination button:disabled:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .page-info {
            text-align: center;
            margin-top: 16px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div id="page-transition"></div>
    <div class="bg-grid"></div>
    <div class="blob blob-pink"></div>
    <div class="blob blob-cyan"></div>

    <nav class="navbar scrolled">
        <div class="nav-container">
            <a href="https://blessephraem.github.io/" class="logo"><span class="accent">EPHRAEM</span></a>
            <button class="mobile-toggle" aria-label="Menu">
                <i class="fa-solid fa-bars"></i>
            </button>
            <ul class="nav-links">
                <li><a href="index.html#home">ACCUEIL</a></li>
                <li><a href="index.html#videos">VIDEOS</a></li>
                <li><a href="index.html#parcours">TIMELINE</a></li>
                <li><a href="index.html#services">SERVICES</a></li>
                <li><a href="index.html#contact" class="btn-nav">CONTACT</a></li>
            </ul>
        </div>
    </nav>

    <section class="section videos-page">
        <div class="container">
            <h2 class="section-title"><span class="accent">VIDEOS</span></h2>

            <!-- Carousel vitrine -->
            <div class="carousel-container">
                <div class="video-card pos-left" id="video-left">
                    <div class="video-wrapper">
                        <div class="video-overlay"></div>
                        <iframe title="Video Left" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                    </div>
                    <h3 class="video-title"></h3>
                </div>
                <div class="video-card pos-center" id="video-center">
                    <div class="video-wrapper">
                        <div class="video-overlay"></div>
                        <iframe title="Video Center" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                    </div>
                    <h3 class="video-title"></h3>
                </div>
                <div class="video-card pos-right" id="video-right">
                    <div class="video-wrapper">
                        <div class="video-overlay"></div>
                        <iframe title="Video Right" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                    </div>
                    <h3 class="video-title"></h3>
                </div>
            </div>
            <p class="desktop-only-hint">
                <small>Cliquez sur une vidéo latérale pour l'afficher au centre.</small>
            </p>

            <div class="videos-grid" id="videos-container"></div>
            <div class="pagination" id="pagination"></div>
            <p class="page-info" id="page-info"></p>
        </div>
    </section>

    <footer>
        <p>&copy; 2025 Ephraem.</p>
    </footer>

    <script src="assets/js/transitions.js"></script>
    <script>
        const PER_PAGE = 6;
        let allVideos = [];
        let currentPage = 1;

        function getYouTubeId(url) {
            const m = url.match(/[?&]v=([A-Za-z0-9_-]{11})/);
            return m ? m[1] : null;
        }

        function renderPage(page) {
            currentPage = page;
            const container = document.getElementById('videos-container');
            const start = (page - 1) * PER_PAGE;
            const slice = allVideos.slice(start, start + PER_PAGE);

            container.innerHTML = slice.map(video => {
                const id = getYouTubeId(video.url);
                if (!id) return '';
                return `<div class="video-item">
                    <iframe src="https://www.youtube-nocookie.com/embed/${id}"
                        title="YouTube video player"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                        allowfullscreen></iframe>
                </div>`;
            }).join('');

            renderPagination();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderPagination() {
            const total = Math.ceil(allVideos.length / PER_PAGE);
            const nav = document.getElementById('pagination');
            const info = document.getElementById('page-info');

            info.textContent = `Page ${currentPage} sur ${total} — ${allVideos.length} vidéos`;

            if (total <= 1) { nav.innerHTML = ''; return; }

            const buttons = [];
            // Bouton Précédent
            buttons.push(`<button ${currentPage === 1 ? 'disabled' : ''} onclick="renderPage(${currentPage - 1})">&#8592;</button>`);

            if (total <= 7) {
                // Si peu de pages, on affiche tout
                for (let i = 1; i <= total; i++) {
                    buttons.push(`<button class="${i === currentPage ? 'active' : ''}" onclick="renderPage(${i})">${i}</button>`);
                }
            } else {
                // Logique de fenêtre glissante (toujours max ~7 slots numériques)
                
                // Toujours la première
                buttons.push(`<button class="${1 === currentPage ? 'active' : ''}" onclick="renderPage(1)">1</button>`);

                if (currentPage > 3) {
                    buttons.push(`<button disabled>…</button>`);
                }

                // Bloc central
                let start = Math.max(2, currentPage - 1);
                let end = Math.min(total - 1, currentPage + 1);

                // Ajustement si on est au début ou à la fin pour garder le même nombre de boutons
                if (currentPage <= 3) end = 4;
                if (currentPage >= total - 2) start = total - 3;

                for (let i = start; i <= end; i++) {
                    buttons.push(`<button class="${i === currentPage ? 'active' : ''}" onclick="renderPage(${i})">${i}</button>`);
                }

                if (currentPage < total - 2) {
                    buttons.push(`<button disabled>…</button>`);
                }

                // Toujours la dernière
                buttons.push(`<button class="${total === currentPage ? 'active' : ''}" onclick="renderPage(${total})">${total}</button>`);
            }

            // Bouton Suivant
            buttons.push(`<button ${currentPage === total ? 'disabled' : ''} onclick="renderPage(${currentPage + 1})">&#8594;</button>`);

            nav.innerHTML = buttons.join('');
        }

        function updateVideoTitles() {
            document.querySelectorAll('.video-card').forEach(card => {
                const iframe = card.querySelector('iframe');
                const titleEl = card.querySelector('.video-title');
                if (iframe && titleEl && iframe.src) {
                    const match = iframe.src.match(/\/embed\/([a-zA-Z0-9_-]+)/);
                    if (match && match[1]) {
                        const videoId = match[1];
                        fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${videoId}`)
                            .then(r => r.json())
                            .then(d => { if (d.title) titleEl.textContent = d.title; })
                            .catch(() => {});
                    }
                }
            });
        }

        document.querySelectorAll('.video-card').forEach(card => {
            card.addEventListener('click', () => {
                if (window.innerWidth <= 900) return;
                if (card.classList.contains('pos-center')) return;
                const currentCenter = document.querySelector('.video-card.pos-center');
                if (!currentCenter) return;
                let pos = '';
                if (card.classList.contains('pos-left')) pos = 'pos-left';
                else if (card.classList.contains('pos-right')) pos = 'pos-right';
                if (!pos) return;
                card.classList.remove(pos);
                card.classList.add('pos-center');
                currentCenter.classList.remove('pos-center');
                currentCenter.classList.add(pos);
                const iframe = currentCenter.querySelector('iframe');
                if (iframe) { const s = iframe.src; iframe.src = s; }
            });
        });

        // Vitrine carousel depuis carousel.json (fichier manuel)
        fetch('carousel.json')
            .then(r => r.ok ? r.json() : Promise.reject())
            .then(data => {
                const featured = data.featured || [];
                const slots = ['video-left', 'video-center', 'video-right'];
                slots.forEach((id, i) => {
                    if (!featured[i]) return;
                    const vid = getYouTubeId(featured[i].url);
                    if (!vid) return;
                    const iframe = document.querySelector('#' + id + ' iframe');
                    if (iframe) iframe.src = 'https://www.youtube.com/embed/' + vid;
                });
                updateVideoTitles();
            })
            .catch(() => {});

        // Grille paginée depuis videos.json (généré par CI)
        fetch('videos.json')
            .then(r => { if (!r.ok) throw new Error(); return r.json(); })
            .then(data => {
                allVideos = (data.videos || []).filter(v => getYouTubeId(v.url));
                if (allVideos.length === 0) {
                    document.getElementById('videos-container').innerHTML =
                        '<p style="text-align:center;grid-column:1/-1;">Aucune vidéo disponible pour le moment.</p>';
                    return;
                }
                renderPage(1);
            })
            .catch(() => {
                document.getElementById('videos-container').innerHTML =
                    '<p style="text-align:center;color:red;grid-column:1/-1;">Erreur lors du chargement des vidéos.</p>';
            });

        const mobileBtn = document.querySelector('.mobile-toggle');
        const navLinks = document.querySelector('.nav-links');
        if (mobileBtn) {
            mobileBtn.addEventListener('click', () => {
                navLinks.classList.toggle('active');
                mobileBtn.innerHTML = navLinks.classList.contains('active')
                    ? '<i class="fa-solid fa-xmark"></i>'
                    : '<i class="fa-solid fa-bars"></i>';
            });
        }

        document.querySelectorAll('.nav-links a[href^="index.html"]').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                leaveAndNavigate(link.getAttribute('href'));
            });
        });

    </script>
</body>
</html>
