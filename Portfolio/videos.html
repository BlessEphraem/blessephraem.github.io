<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ephraem | Toutes les Vidéos</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    
    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        .videos-page {
            padding-top: 120px;
            min-height: 100vh;
        }
        
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .video-item {
            position: relative;
            padding-bottom: 56.25%; /* Ratio 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .video-item:hover {
            transform: translateY(-5px);
            border-color: #ff1796;
        }

        .video-item iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo"><span class="accent">EPHRAEM</span></a>
            <button class="mobile-toggle" aria-label="Menu">
                <i class="fa-solid fa-bars"></i>
            </button>
            <ul class="nav-links">
                <li><a href="index.html#home">Accueil</a></li>
                <li><a href="index.html#portfolio">Retour au Portfolio</a></li>
            </ul>
        </div>
    </nav>

    <section class="section videos-page bg-alt">
        <div class="container">
            <h2 class="section-title">TOUTES MES <span class="accent">VIDÉOS</span></h2>
            <div class="videos-grid" id="videos-container">
                <!-- Les vidéos seront injectées ici par le Javascript -->
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2025 Ephraem.</p>
    </footer>

    <script>
        // Fonction pour extraire l'ID de la vidéo YouTube depuis n'importe quel lien YouTube
        function getYouTubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        // Charger le fichier videos.json et générer la grille
        fetch('videos.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error("Erreur lors du chargement de videos.json");
                }
                return response.json();
            })
            .then(data => {
                const container = document.getElementById('videos-container');
                
                if (data.videos && data.videos.length > 0) {
                    data.videos.forEach(video => {
                        const videoId = getYouTubeId(video.url);
                        if (videoId) {
                            const embedUrl = `https://www.youtube-nocookie.com/embed/${videoId}`;
                            const html = `
                                <div class="video-item">
                                    <iframe src="${embedUrl}" title="YouTube video player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                                </div>
                            `;
                            container.innerHTML += html;
                        }
                    });
                } else {
                    container.innerHTML = '<p style="text-align: center; grid-column: 1 / -1;">Aucune vidéo disponible pour le moment.</p>';
                }
            })
            .catch(error => {
                console.error(error);
                document.getElementById('videos-container').innerHTML = '<p style="text-align: center; color: red; grid-column: 1 / -1;">Erreur lors du chargement des vidéos.</p>';
            });

        // Gestion du menu mobile
        const mobileBtn = document.querySelector('.mobile-toggle');
        const navLinks = document.querySelector('.nav-links');
        if(mobileBtn) {
            mobileBtn.addEventListener('click', () => {
                navLinks.classList.toggle('active');
                if(navLinks.classList.contains('active')){
                    mobileBtn.innerHTML = '<i class="fa-solid fa-xmark"></i>';
                } else {
                    mobileBtn.innerHTML = '<i class="fa-solid fa-bars"></i>';
                }
            });
        }
    </script>
</body>
</html>
