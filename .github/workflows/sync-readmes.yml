name: Sync READMEs

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch and write docs
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          python3 << 'PY'
          import urllib.request, pathlib, os

          token = os.environ.get("GH_TOKEN", "")
          headers = {"Authorization": f"token {token}"} if token else {}

          def fetch(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as r:
                  return r.read().decode("utf-8")

          def write_doc(path, frontmatter, content):
              pathlib.Path(path).parent.mkdir(parents=True, exist_ok=True)
              out = frontmatter + "\n\n" + content
              pathlib.Path(path).write_text(out, encoding="utf-8")
              print(f"Written: {path}")

          BASE_IB = "https://raw.githubusercontent.com/BlessEphraem/InputBar/main/.docs"
          BASE_PC = "https://raw.githubusercontent.com/BlessEphraem/Premiere-Companion/main/.docs"

          sources = [
              # Profile README → intro
              (
                  "https://raw.githubusercontent.com/BlessEphraem/BlessEphraem/main/README.md",
                  "wiki/docs/intro.mdx",
                  "---\nid: intro\ntitle: About\nsidebar_position: 1\n---",
              ),
              # JSX Runner
              (
                  "https://raw.githubusercontent.com/BlessEphraem/JSX-Runner/main/README.md",
                  "wiki/docs/plugins/jsx-runner.mdx",
                  "---\nid: jsx-runner\ntitle: JSX Runner\nsidebar_position: 1\n---",
              ),
              # JSX Scripts
              (
                  "https://raw.githubusercontent.com/BlessEphraem/UXP/main/README.md",
                  "wiki/docs/plugins/jsx-scripts.mdx",
                  "---\nid: jsx-scripts\ntitle: JSX Scripts\nsidebar_position: 2\n---",
              ),
              # InputBar
              (f"{BASE_IB}/Configuration.md", "wiki/docs/programs/inputbar/getting-started.mdx",
               "---\nid: getting-started\ntitle: Configuration\nsidebar_position: 1\n---"),
              (f"{BASE_IB}/Settings.md", "wiki/docs/programs/inputbar/settings.mdx",
               "---\nid: settings\ntitle: Settings\nsidebar_position: 2\n---"),
              (f"{BASE_IB}/Hotkeys.md", "wiki/docs/programs/inputbar/hotkeys.mdx",
               "---\nid: hotkeys\ntitle: Hotkeys\nsidebar_position: 3\n---"),
              (f"{BASE_IB}/Theme.md", "wiki/docs/programs/inputbar/theme.mdx",
               "---\nid: theme\ntitle: Themes\nsidebar_position: 4\n---"),
              (f"{BASE_IB}/Plugins.md", "wiki/docs/programs/inputbar/plugins.mdx",
               "---\nid: plugins\ntitle: Plugins Overview\nsidebar_position: 5\n---"),
              (f"{BASE_IB}/CreatePlugins.md", "wiki/docs/programs/inputbar/create-plugins.mdx",
               "---\nid: create-plugins\ntitle: Create a Plugin\nsidebar_position: 6\n---"),
              (f"{BASE_IB}/IPC.md", "wiki/docs/programs/inputbar/ipc.mdx",
               "---\nid: ipc\ntitle: IPC / External Trigger\nsidebar_position: 7\n---"),
              (f"{BASE_IB}/Plugins/App.md", "wiki/docs/programs/inputbar/plugins/app.mdx",
               "---\nid: app\ntitle: App Plugin\nsidebar_position: 1\n---"),
              (f"{BASE_IB}/Plugins/Calc.md", "wiki/docs/programs/inputbar/plugins/calc.mdx",
               "---\nid: calc\ntitle: Calc Plugin\nsidebar_position: 2\n---"),
              (f"{BASE_IB}/Plugins/System.md", "wiki/docs/programs/inputbar/plugins/system.mdx",
               "---\nid: system\ntitle: System Plugin\nsidebar_position: 3\n---"),
              (f"{BASE_IB}/Plugins/Shell.md", "wiki/docs/programs/inputbar/plugins/shell.mdx",
               "---\nid: shell\ntitle: Shell Plugin\nsidebar_position: 4\n---"),
              (f"{BASE_IB}/Plugins/Everything.md", "wiki/docs/programs/inputbar/plugins/everything.mdx",
               "---\nid: everything\ntitle: Everything Plugin\nsidebar_position: 5\n---"),
              # Premiere Companion
              (f"{BASE_PC}/GettingStarted.md", "wiki/docs/programs/premiere-companion/getting-started.mdx",
               "---\nid: getting-started\ntitle: Getting Started\nsidebar_position: 1\n---"),
              (f"{BASE_PC}/SearchBar.md", "wiki/docs/programs/premiere-companion/search-bar.mdx",
               "---\nid: search-bar\ntitle: Search Bar\nsidebar_position: 2\n---"),
              (f"{BASE_PC}/QuickApply.md", "wiki/docs/programs/premiere-companion/quick-apply.mdx",
               "---\nid: quick-apply\ntitle: Quick Apply (Presets)\nsidebar_position: 3\n---"),
              (f"{BASE_PC}/Commands.md", "wiki/docs/programs/premiere-companion/commands.mdx",
               "---\nid: commands\ntitle: Commands\nsidebar_position: 4\n---"),
              (f"{BASE_PC}/MacrosAndHotkeys.md", "wiki/docs/programs/premiere-companion/macros-hotkeys.mdx",
               "---\nid: macros-hotkeys\ntitle: Macros & Hotkeys\nsidebar_position: 5\n---"),
              (f"{BASE_PC}/BetterMotion.md", "wiki/docs/programs/premiere-companion/better-motion.mdx",
               "---\nid: better-motion\ntitle: Better Motion\nsidebar_position: 6\n---"),
          ]

          for url, path, frontmatter in sources:
              try:
                  content = fetch(url)
                  write_doc(path, frontmatter, content)
              except Exception as e:
                  print(f"ERROR fetching {url}: {e}")

          print("Done.")
          PY

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wiki/docs/
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: sync docs from upstream repos"
            git push
          fi
