name: Sync READMEs

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch and write docs
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          python3 << 'PY'
          import urllib.request, pathlib, os, re, json

          token = os.environ.get("GH_TOKEN", "")
          headers = {"Authorization": f"token {token}"} if token else {}

          def fetch(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as r:
                  return r.read().decode("utf-8")

          def fetch_json(url):
              api_headers = dict(headers)
              api_headers["Accept"] = "application/vnd.github+json"
              req = urllib.request.Request(url, headers=api_headers)
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.loads(r.read().decode("utf-8"))
              except urllib.error.HTTPError as e:
                  if e.code == 404:
                      return None
                  raise

          def build_release_markdown(data):
              tag = data.get("tag_name") or data.get("name") or "Latest Release"
              name = data.get("name") or ""
              body = (data.get("body") or "").strip()
              assets = data.get("assets") or []
              html_url = data.get("html_url", "")

              lines = [f"# {tag}", ""]
              if name and name != tag:
                  lines += [f"_{name}_", ""]
              if body:
                  lines += [body, ""]
              lines += ["## Downloads", ""]
              if assets:
                  for a in assets:
                      lines.append(f"- [{a.get('name', 'asset')}]({a.get('browser_download_url', '')})")
              else:
                  lines.append("_No downloadable assets attached to this release._")
              if html_url:
                  lines += ["", f"[View on GitHub]({html_url})"]
              return "\n".join(lines)

          def rewrite_media(content, img_prefix):
              # baseUrl is /wiki/ so static files are served at /wiki/img/
              # 1. Rewrite relative medias/ paths
              content = re.sub(r'(?:\.\.?/)?medias/', f'/wiki/img/{img_prefix}/', content)
              # 2. Rewrite already-converted /img/<prefix>/ that are missing /wiki/ prefix
              content = re.sub(rf'(?<!/wiki)/img/{re.escape(img_prefix)}/', f'/wiki/img/{img_prefix}/', content)
              return content

          def css_to_jsx_style(css):
              props = {}
              for decl in css.split(';'):
                  decl = decl.strip()
                  if ':' not in decl:
                      continue
                  prop, _, val = decl.partition(':')
                  prop = prop.strip()
                  val = val.strip().replace("'", "\\'")
                  parts = prop.split('-')
                  camel = parts[0] + ''.join(p.capitalize() for p in parts[1:])
                  props[camel] = val
              return ', '.join("{}: '{}'".format(k, v) for k, v in props.items())

          def fix_html_for_mdx(content):
              # Convert style="..." CSS strings to JSX style={{...}} objects
              content = re.sub(
                  r'style="([^"]*)"',
                  lambda m: 'style={{' + css_to_jsx_style(m.group(1)) + '}}',
                  content
              )
              # Self-close void HTML elements required by MDX/JSX
              content = re.sub(
                  r'<(img|br|hr|input|meta|link)([^>]*?)(?<!/)>',
                  lambda m: '<{}{} />'.format(m.group(1), m.group(2).rstrip()),
                  content
              )
              # Fix </br> / </hr> used as self-close in old HTML
              content = re.sub(r'</(br|hr)>', lambda m: '<{} />'.format(m.group(1)), content)
              return content

          def write_doc(path, frontmatter, content, img_prefix=None):
              pathlib.Path(path).parent.mkdir(parents=True, exist_ok=True)
              if img_prefix:
                  content = rewrite_media(content, img_prefix)
              content = fix_html_for_mdx(content)
              out = frontmatter + "\n\n" + content
              pathlib.Path(path).write_text(out, encoding="utf-8")
              print(f"Written: {path}")

          BASE_IB = "https://raw.githubusercontent.com/BlessEphraem/InputBar/main/.docs"
          BASE_PC = "https://raw.githubusercontent.com/BlessEphraem/Premiere-Companion/main/.docs"

          # (url, output_path, frontmatter, img_prefix_or_None)
          sources = [
              # Profile README → intro
              ("https://raw.githubusercontent.com/BlessEphraem/BlessEphraem/main/README.md",
               "wiki/docs/intro.mdx",
               "---\nid: intro\ntitle: About\nsidebar_position: 1\n---", None),
              # JSX Runner
              ("https://raw.githubusercontent.com/BlessEphraem/JSX-Runner/main/README.md",
               "wiki/docs/plugins/jsx-runner.mdx",
               "---\nid: jsx-runner\ntitle: JSX Runner\nsidebar_position: 1\n---", None),
              # JSX Scripts
              ("https://raw.githubusercontent.com/BlessEphraem/UXP/main/README.md",
               "wiki/docs/plugins/jsx-scripts.mdx",
               "---\nid: jsx-scripts\ntitle: JSX Scripts\nsidebar_position: 2\n---", None),
              # InputBar
              (f"{BASE_IB}/Configuration.md", "wiki/docs/programs/inputbar/getting-started.mdx",
               "---\nid: getting-started\ntitle: Configuration\nsidebar_position: 1\n---", "inputbar"),
              (f"{BASE_IB}/Settings.md", "wiki/docs/programs/inputbar/settings.mdx",
               "---\nid: settings\ntitle: Settings\nsidebar_position: 2\n---", "inputbar"),
              (f"{BASE_IB}/Hotkeys.md", "wiki/docs/programs/inputbar/hotkeys.mdx",
               "---\nid: hotkeys\ntitle: Hotkeys\nsidebar_position: 3\n---", "inputbar"),
              (f"{BASE_IB}/Theme.md", "wiki/docs/programs/inputbar/theme.mdx",
               "---\nid: theme\ntitle: Themes\nsidebar_position: 4\n---", "inputbar"),
              (f"{BASE_IB}/Plugins.md", "wiki/docs/programs/inputbar/plugins.mdx",
               "---\nid: plugins\ntitle: Plugins Overview\nsidebar_position: 5\n---", "inputbar"),
              (f"{BASE_IB}/CreatePlugins.md", "wiki/docs/programs/inputbar/create-plugins.mdx",
               "---\nid: create-plugins\ntitle: Create a Plugin\nsidebar_position: 6\n---", "inputbar"),
              (f"{BASE_IB}/IPC.md", "wiki/docs/programs/inputbar/ipc.mdx",
               "---\nid: ipc\ntitle: IPC / External Trigger\nsidebar_position: 7\n---", "inputbar"),
              (f"{BASE_IB}/Plugins/App.md", "wiki/docs/programs/inputbar/plugins/app.mdx",
               "---\nid: app\ntitle: App Plugin\nsidebar_position: 1\n---", "inputbar"),
              (f"{BASE_IB}/Plugins/Calc.md", "wiki/docs/programs/inputbar/plugins/calc.mdx",
               "---\nid: calc\ntitle: Calc Plugin\nsidebar_position: 2\n---", "inputbar"),
              (f"{BASE_IB}/Plugins/System.md", "wiki/docs/programs/inputbar/plugins/system.mdx",
               "---\nid: system\ntitle: System Plugin\nsidebar_position: 3\n---", "inputbar"),
              (f"{BASE_IB}/Plugins/Shell.md", "wiki/docs/programs/inputbar/plugins/shell.mdx",
               "---\nid: shell\ntitle: Shell Plugin\nsidebar_position: 4\n---", "inputbar"),
              (f"{BASE_IB}/Plugins/Everything.md", "wiki/docs/programs/inputbar/plugins/everything.mdx",
               "---\nid: everything\ntitle: Everything Plugin\nsidebar_position: 5\n---", "inputbar"),
              # Premiere Companion
              (f"{BASE_PC}/GettingStarted.md", "wiki/docs/programs/premiere-companion/getting-started.mdx",
               "---\nid: getting-started\ntitle: Getting Started\nsidebar_position: 1\n---", "premiere-companion"),
              (f"{BASE_PC}/SearchBar.md", "wiki/docs/programs/premiere-companion/search-bar.mdx",
               "---\nid: search-bar\ntitle: Search Bar\nsidebar_position: 2\n---", "premiere-companion"),
              (f"{BASE_PC}/QuickApply.md", "wiki/docs/programs/premiere-companion/quick-apply.mdx",
               "---\nid: quick-apply\ntitle: Quick Apply (Presets)\nsidebar_position: 3\n---", "premiere-companion"),
              (f"{BASE_PC}/Commands.md", "wiki/docs/programs/premiere-companion/commands.mdx",
               "---\nid: commands\ntitle: Commands\nsidebar_position: 4\n---", "premiere-companion"),
              (f"{BASE_PC}/MacrosAndHotkeys.md", "wiki/docs/programs/premiere-companion/macros-hotkeys.mdx",
               "---\nid: macros-hotkeys\ntitle: Macros & Hotkeys\nsidebar_position: 5\n---", "premiere-companion"),
              (f"{BASE_PC}/BetterMotion.md", "wiki/docs/programs/premiere-companion/better-motion.mdx",
               "---\nid: better-motion\ntitle: Better Motion\nsidebar_position: 6\n---", "premiere-companion"),
          ]

          for url, path, frontmatter, img_prefix in sources:
              try:
                  content = fetch(url)
                  write_doc(path, frontmatter, content, img_prefix)
              except Exception as e:
                  print(f"ERROR fetching {url}: {e}")

          # (owner, repo, output_path, doc_id, title)
          release_checks = [
              ("BlessEphraem", "InputBar",
               "wiki/docs/programs/inputbar/releases.mdx",
               "releases", "Download / Releases"),
              ("BlessEphraem", "Premiere-Companion",
               "wiki/docs/programs/premiere-companion/releases.mdx",
               "releases", "Download / Releases"),
          ]

          for owner, repo, path, doc_id, title in release_checks:
              api_url = f"https://api.github.com/repos/{owner}/{repo}/releases/latest"
              try:
                  data = fetch_json(api_url)
              except Exception as e:
                  print(f"ERROR fetching releases for {owner}/{repo}: {e}")
                  continue
              if data is None:
                  print(f"No latest release for {owner}/{repo} (skipping).")
                  continue
              content = build_release_markdown(data)
              frontmatter = f"---\nid: {doc_id}\ntitle: {title}\nsidebar_position: 0\n---"
              try:
                  write_doc(path, frontmatter, content)
              except Exception as e:
                  print(f"ERROR writing release page for {owner}/{repo}: {e}")

          print("Done.")
          PY

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wiki/docs/
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: sync docs from upstream repos"
            git push
          fi
