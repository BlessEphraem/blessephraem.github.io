name: Website Wiki Build

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync docs from upstream repos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PY'
          import urllib.request, pathlib, os, re, json

          token = os.environ.get("GH_TOKEN", "")
          headers = {"Authorization": f"token {token}"} if token else {}

          def fetch(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as r:
                  return r.read().decode("utf-8")

          def fetch_json(url):
              api_headers = dict(headers)
              api_headers["Accept"] = "application/vnd.github+json"
              req = urllib.request.Request(url, headers=api_headers)
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.loads(r.read().decode("utf-8"))
              except urllib.error.HTTPError as e:
                  if e.code == 404:
                      return None
                  raise

          def slugify(text):
              text = text.lower()
              text = re.sub(r'[^\w\s-]', '', text)
              return re.sub(r'[\s-]+', '-', text).strip('-')

          with open(".github/topic-map.json", encoding="utf-8") as _f:
              _topic_config = json.load(_f)

          TOPIC_PRIORITY = {
              item["topic"]: (item["category"], idx)
              for idx, item in enumerate(_topic_config["mappings"])
          }

          def _assign_category(topics):
              best = None
              for topic in topics:
                  if topic in TOPIC_PRIORITY:
                      cat, priority = TOPIC_PRIORITY[topic]
                      if best is None or priority < best[1]:
                          best = (cat, priority)
              return best[0] if best else None

          def _fetch_all_repos(username):
              all_repos = []
              page = 1
              while True:
                  url = f"https://api.github.com/users/{username}/repos?type=owner&per_page=100&page={page}"
                  data = fetch_json(url)
                  if not data:
                      break
                  all_repos.extend(data)
                  if len(data) < 100:
                      break
                  page += 1
              return all_repos

          OWNER = "BlessEphraem"
          print("Fetching all public repos...")
          _all_repos = _fetch_all_repos(OWNER)

          PROGRAMS = []
          for _repo in _all_repos:
              if _repo.get("private") or _repo.get("archived") or _repo.get("fork"):
                  continue
              _topics = _repo.get("topics", [])
              _category = _assign_category(_topics)
              if _category is None:
                  print(f"[SKIP] {_repo['name']} — topics: {_topics}")
                  continue
              PROGRAMS.append({
                  "owner": OWNER,
                  "repo": _repo["name"],
                  "display_name": _repo["name"].replace("-", " "),
                  "category": _category,
                  "description": _repo.get("description") or "",
                  "default_branch": _repo.get("default_branch", "main"),
              })
              print(f"[INCLUDE] {_repo['name']} → {_category}")

          _cat_index = {item["category"]: idx for idx, item in enumerate(_topic_config["mappings"])}
          PROGRAMS.sort(key=lambda p: (_cat_index.get(p["category"], 999), p["display_name"].lower()))

          category_color = {item["category"]: item.get("color", "#ffffff") for item in _topic_config["mappings"]}
          category_first_slug = {}
          for _p in PROGRAMS:
              _cat = _p["category"]
              if _cat not in category_first_slug:
                  category_first_slug[_cat] = slugify(_p["repo"])

          def build_release_markdown(data):
              tag = data.get("tag_name") or data.get("name") or "Latest Release"
              name = data.get("name") or ""
              body = (data.get("body") or "").strip()
              assets = data.get("assets") or []
              html_url = data.get("html_url", "")

              lines = [f"# {tag}", ""]
              if name and name != tag:
                  lines += [f"_{name}_", ""]
              if body:
                  lines += [body, ""]
              lines += ["## Downloads", ""]
              if assets:
                  for a in assets:
                      lines.append(f"- [{a.get('name', 'asset')}]({a.get('browser_download_url', '')})")
              else:
                  lines.append("_No downloadable assets attached to this release._")
              if html_url:
                  lines += ["", f"[View on GitHub]({html_url})"]
              return "\n".join(lines)

          def extract_h1_title(content):
              m = re.search(r'^#\s+(.+)$', content, re.MULTILINE)
              if m:
                  return m.group(1).strip()
              return None

          def filename_to_label(name):
              return name.replace('_', ' ')

          def rewrite_readme_absolute_paths(content, owner, repo, branch='main'):
              raw_base = f"https://raw.githubusercontent.com/{owner}/{repo}/{branch}"
              def replace_md_img(m):
                  alt, path = m.group(1), m.group(2)
                  if path.startswith(('http', '/', '#')) or 'medias/' in path or 'media/' in path:
                      return m.group(0)
                  return f'![{alt}]({raw_base}/{path})'
              content = re.sub(r'!\[([^\]]*)\]\(([^)#\s]+)\)', replace_md_img, content)
              def replace_html_src(m):
                  src = m.group(1)
                  if src.startswith(('http', '/', '#', 'data:')) or 'medias/' in src or 'media/' in src:
                      return m.group(0)
                  return f'src="{raw_base}/{src}"'
              content = re.sub(r'\bsrc="([^"]+)"', replace_html_src, content)
              return content

          def rewrite_media(content, img_prefix):
              content = re.sub(r'\.docs/(?:\.\.?/)?medias/', f'/wiki/img/{img_prefix}/', content)
              content = re.sub(r'(?:\.\.?/)?medias/', f'/wiki/img/{img_prefix}/', content)
              content = re.sub(rf'(?<!/wiki)/img/{re.escape(img_prefix)}/', f'/wiki/img/{img_prefix}/', content)
              return content

          def css_to_jsx_style(css):
              props = {}
              for decl in css.split(';'):
                  decl = decl.strip()
                  if ':' not in decl:
                      continue
                  prop, _, val = decl.partition(':')
                  prop = prop.strip()
                  val = val.strip().replace("'", "\\'")
                  parts = prop.split('-')
                  camel = parts[0] + ''.join(p.capitalize() for p in parts[1:])
                  props[camel] = val
              return ', '.join("{}: '{}'".format(k, v) for k, v in props.items())

          def fix_folder_links(content, dir_name):
              folder_escaped = re.escape(dir_name)
              def replace_href(m):
                  file_part = m.group(1)
                  slug = re.sub(r'[^a-zA-Z0-9_]+', '-', file_part[:-3]).strip('-').lower()
                  return f'href="./{slug}"'
              content = re.sub(
                  rf'href="{folder_escaped}/([^"/]+\.md)"',
                  replace_href, content, flags=re.IGNORECASE
              )
              def replace_mdlink(m):
                  text, file_part = m.group(1), m.group(2)
                  slug = re.sub(r'[^a-zA-Z0-9_]+', '-', file_part[:-3]).strip('-').lower()
                  return f'[{text}](./{slug})'
              content = re.sub(
                  rf'\[([^\]]+)\]\({folder_escaped}/([^)]+\.md)\)',
                  replace_mdlink, content, flags=re.IGNORECASE
              )
              return content

          def fix_html_for_mdx(content, img_prefix=None):
              # Remove content hidden for wiki
              content = re.sub(r'<!--\s*wiki-hide-start\s*-->.*?<!--\s*wiki-hide-end\s*-->', '', content, flags=re.DOTALL)
              
              content = re.sub(r'<!--\s*embed\s*(.*?)-->', lambda m: m.group(1).strip(), content, flags=re.DOTALL)
              
              def transform_url(url):
                  # Treat absolute links to our own domain as internal links
                  my_domain = "https://blessephraem.github.io/wiki"
                  if url.startswith(my_domain):
                      url = url[len("https://blessephraem.github.io"):]
                  
                  if "://" in url or url.startswith(('#', 'mailto:', 'tel:', '/')):
                      return url
                  
                  parts = url.split('#', 1)
                  path = parts[0]
                  anchor = parts[1] if len(parts) > 1 else None
                  
                  # Detect if it's a link to a README or another .md file
                  is_readme = "readme.md" in path.lower() or path.lower() == "readme"
                  is_md = path.lower().endswith(".md")
                  
                  if is_readme:
                      if img_prefix:
                          path = f"/wiki/programs/{img_prefix}/"
                      else:
                          path = "./"
                  elif is_md:
                      path = path[:-3] # remove .md
                      path_parts = path.split('/')
                      new_parts = []
                      for p in path_parts:
                          if p in ('.', '..') or not p:
                              continue
                          new_parts.append(slugify(p))
                      
                      slug_path = "/".join(new_parts)
                      if img_prefix:
                          path = f"/wiki/programs/{img_prefix}/{slug_path}"
                      else:
                          path = slug_path
                  
                  if anchor:
                      return f"{path}#{slugify(anchor)}"
                  return path

              # Matches [text](url) - supporting nested brackets for badges
              content = re.sub(r'\[((?:\[[^\]]*\]|[^\]])*)\]\(([^)]+)\)', 
                               lambda m: f'[{m.group(1)}]({transform_url(m.group(2))})', content)
              
              # Match HTML href="url"
              content = re.sub(r'href="([^"]+)"', lambda m: f'href="{transform_url(m.group(1))}"', content)

              content = re.sub(
                  r'(https://github\.com/[^\s)\]"]+\.(?:mp4|webm))',
                  r'<video controls width="100%"><source src="\1" /></video>',
                  content
              )
              content = re.sub(
                  r'style="([^"]*)"',
                  lambda m: 'style={{' + css_to_jsx_style(m.group(1)) + '}}',
                  content
              )
              content = re.sub(
                  r'<(img|br|hr|input|meta|link)([^>]*?)(?<!/)>',
                  lambda m: '<{}{} />'.format(m.group(1), m.group(2).rstrip()),
                  content
              )
              content = re.sub(
                  r'src="https://www\.youtube\.com/embed/([^"]+)"',
                  r'src="https://www.youtube-nocookie.com/embed/\1"',
                  content
              )
              content = re.sub(r'</(br|hr)>', lambda m: '<{} />'.format(m.group(1)), content)
              content = re.sub(r'\bframeborder=', 'frameBorder=', content, flags=re.IGNORECASE)
              content = re.sub(r'\ballowfullscreen\b', 'allowFullScreen', content, flags=re.IGNORECASE)
              return content

          def write_doc(path, frontmatter, content, img_prefix=None):
              pathlib.Path(path).parent.mkdir(parents=True, exist_ok=True)
              if img_prefix:
                  content = rewrite_media(content, img_prefix)
              content = fix_html_for_mdx(content, img_prefix)
              out = frontmatter + "\n\n" + content
              pathlib.Path(path).write_text(out, encoding="utf-8")
              print(f"Written: {path}")

          def fetch_binary(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as r:
                  return r.read()

          def fetch_directory_recursively(owner, repo, api_path, local_base_dir, img_prefix):
              api_url = f"https://api.github.com/repos/{owner}/{repo}/contents/{api_path}"
              data = fetch_json(api_url)
              if not data:
                  return
              if not isinstance(data, list):
                  data = [data]

              dirs = {}
              files = {}
              for item in data:
                  iname = item.get("name", "")
                  itype = item.get("type", "")
                  if itype == "dir":
                      dirs[iname] = item
                  elif itype == "file":
                      files[iname] = item

              folder_linked = {}
              for dir_name in dirs:
                  for fname in files:
                      if fname.lower() == dir_name.lower() + ".md":
                          folder_linked[dir_name] = fname
                          break

              folder_index_files = set(folder_linked.values())
              docs_root = pathlib.Path("wiki/docs")

              for dir_name, dir_item in dirs.items():
                  if dir_name.startswith("."):
                      continue
                  if dir_name.lower() in ("medias", "media"):
                      fetch_directory_recursively(owner, repo, dir_item["path"], local_base_dir, img_prefix)
                      continue

                  safe_dir_name = re.sub(r'[^a-zA-Z0-9_]+', '-', dir_name).strip('-').lower()
                  new_local_dir = pathlib.Path(local_base_dir) / safe_dir_name
                  new_local_dir.mkdir(parents=True, exist_ok=True)

                  if dir_name in folder_linked:
                      md_file_name = folder_linked[dir_name]
                      md_item = files[md_file_name]
                      try:
                          content = fetch(md_item["download_url"])
                          content = fix_folder_links(content, dir_name)
                          h1_title = extract_h1_title(content)
                          label = h1_title or filename_to_label(dir_name)
                          try:
                              rel_path = new_local_dir.relative_to(docs_root)
                              doc_id = str(rel_path / "index").replace("\\", "/")
                          except ValueError:
                              doc_id = (new_local_dir / "index").as_posix()
                          label_escaped = label.replace('"', '\\"')
                          cat_data = {"label": label, "link": {"type": "doc", "id": doc_id}}
                          (new_local_dir / "_category_.json").write_text(json.dumps(cat_data), encoding="utf-8")
                          frontmatter = f'---\ntitle: "{label_escaped}"\n---'
                          write_doc(str(new_local_dir / "index.mdx"), frontmatter, content, img_prefix)
                      except Exception as e:
                          print(f"ERROR processing folder-linked doc {md_file_name}: {e}")
                          label = filename_to_label(dir_name)
                          cat_data = {"label": label}
                          (new_local_dir / "_category_.json").write_text(json.dumps(cat_data), encoding="utf-8")
                  else:
                      label = filename_to_label(dir_name)
                      cat_data = {"label": label}
                      (new_local_dir / "_category_.json").write_text(json.dumps(cat_data), encoding="utf-8")

                  fetch_directory_recursively(owner, repo, dir_item["path"], str(new_local_dir), img_prefix)

              for name, item in files.items():
                  if name in folder_index_files:
                      continue
                  download_url = item.get("download_url")
                  if not download_url:
                      continue
                  ext = name.lower().split('.')[-1]
                  if ext == "md":
                      base_name = name[:-3]
                      safe_id = re.sub(r'[^a-zA-Z0-9_]+', '-', base_name).strip('-').lower()
                      try:
                          content = fetch(download_url)
                          h1_title = extract_h1_title(content)
                          label = h1_title or filename_to_label(base_name)
                          label_escaped = label.replace('"', '\\"')
                          frontmatter = f'---\ntitle: "{label_escaped}"\n---'
                          local_file_path = pathlib.Path(local_base_dir) / f"{safe_id}.mdx"
                          write_doc(str(local_file_path), frontmatter, content, img_prefix)
                      except Exception as e:
                          print(f"ERROR fetching {download_url}: {e}")
                  elif ext in ["png", "jpg", "jpeg", "gif", "svg", "webp", "ico"] and img_prefix:
                      try:
                          static_img_dir = pathlib.Path("wiki/static/img") / img_prefix
                          static_img_dir.mkdir(parents=True, exist_ok=True)
                          img_path = static_img_dir / name
                          img_data = fetch_binary(download_url)
                          img_path.write_bytes(img_data)
                          print(f"Downloaded media: {img_path}")
                      except Exception as e:
                          print(f"ERROR downloading media {download_url}: {e}")

          # No more manual sources, all automated via PROGRAMS loop


          for prog in PROGRAMS:
              owner = prog["owner"]
              repo = prog["repo"]
              display_name = prog["display_name"]
              category = prog["category"]
              branch = prog["default_branch"]
              slug = slugify(repo)

              print(f"Fetching {display_name} docs...")
              try:
                  content = fetch(f"https://raw.githubusercontent.com/{owner}/{repo}/{branch}/README.md")
                  content = rewrite_readme_absolute_paths(content, owner, repo, branch)
                  write_doc(
                      f"wiki/docs/{category}/{slug}/index.mdx",
                      f"---\ntitle: {display_name}\nhide_title: true\npagination_prev: null\npagination_next: null\n---",
                      content, slug
                  )
              except Exception as e:
                  print(f"[NO README] {display_name}: {e} — generating placeholder")
                  _desc_line = f"\n\n{prog['description']}" if prog['description'] else ""
                  _placeholder = (
                      f"# {display_name}{_desc_line}\n\n"
                      ":::info No documentation available yet\n"
                      "This project does not have a wiki page yet. "
                      "You can follow the repository on GitHub for updates.\n"
                      ":::\n\n"
                      f"[View on GitHub](https://github.com/{owner}/{repo})\n"
                  )
                  write_doc(
                      f"wiki/docs/{category}/{slug}/index.mdx",
                      f"---\ntitle: {display_name}\nhide_title: true\npagination_prev: null\npagination_next: null\n---",
                      _placeholder
                  )

              prog_dir = pathlib.Path(f"wiki/docs/{category}/{slug}")
              prog_dir.mkdir(parents=True, exist_ok=True)
              (prog_dir / "_category_.json").write_text(
                  json.dumps({"label": display_name, "link": {"type": "doc", "id": f"{category}/{slug}/index"}}),
                  encoding="utf-8"
              )
              fetch_directory_recursively(owner, repo, ".docs", str(prog_dir), slug)

              # Append DocCardList only if child docs exist (prevents crash on empty categories)
              child_docs = [f for f in prog_dir.rglob("*.mdx") if f.name != "index.mdx"]
              index_path = prog_dir / "index.mdx"
              if child_docs and index_path.exists():
                  existing = index_path.read_text(encoding="utf-8")
                  if "<DocCardList" not in existing:
                      existing += "\n\n---\n## Documentation\nimport DocCardList from '@theme/DocCardList';\n\n<DocCardList />\n"
                      index_path.write_text(existing, encoding="utf-8")

          for prog in PROGRAMS:
              owner = prog["owner"]
              repo = prog["repo"]
              category = prog["category"]
              slug = slugify(repo)
              path = f"wiki/docs/{category}/{slug}/releases.mdx"
              doc_id = "releases"
              title = "📥 Releases"
              
              api_url = f"https://api.github.com/repos/{owner}/{repo}/releases/latest"
              try:
                  data = fetch_json(api_url)
              except Exception as e:
                  print(f"ERROR fetching releases for {owner}/{repo}: {e}")
                  continue
              if data is None:
                  print(f"No latest release for {owner}/{repo} (skipping).")
                  continue
              content = build_release_markdown(data)
              next_id = f"{category}/{slug}/index"
              frontmatter = f"---\nid: {doc_id}\ntitle: {title}\nsidebar_position: 0\npagination_prev: null\npagination_next: {next_id}\n---"
              try:
                  write_doc(path, frontmatter, content, slug)
              except Exception as e:
                  print(f"ERROR writing release page for {owner}/{repo}: {e}")

          print("Done.")

          # Generate metadata for dynamic navbar
          dynamic_css = ""
          for prog in PROGRAMS:
              owner = prog["owner"]
              repo = prog["repo"]
              img_prefix = slugify(repo)
              try:
                  readme_content = fetch(f"https://raw.githubusercontent.com/{owner}/{repo}/{prog['default_branch']}/README.md")
                  first_lines = "\n".join(readme_content.split("\n")[:50])
                  icon_match = re.search(r'<img[^>]+src=["\']([^"\']+\.(?:svg|ico|png|jpg|jpeg))["\']', first_lines)
                  if icon_match:
                      icon_url = icon_match.group(1)
                      if not icon_url.startswith("http"):
                          icon_url = f"https://raw.githubusercontent.com/{owner}/{repo}/{prog['default_branch']}/{icon_url.lstrip('./')}"

                      try:
                          icon_data = fetch_binary(icon_url)
                          ext = icon_url.split(".")[-1].split("?")[0]
                          local_path = f"wiki/static/img/{img_prefix}/logo_navbar.{ext}"
                          pathlib.Path(local_path).parent.mkdir(parents=True, exist_ok=True)
                          pathlib.Path(local_path).write_bytes(icon_data)

                          # Add dynamic CSS rule for this prefix using specific selectors to avoid inheritance
                          selectors = [
                              f".sidebar-icon-{img_prefix} > .menu__link::before",
                              f".sidebar-icon-{img_prefix} > .menu__list-item-collapsible > .menu__link::before"
                          ]
                          dynamic_css += f"{', '.join(selectors)} {{ background-image: url('../../static/img/{img_prefix}/logo_navbar.{ext}'); }}\n"
                          print(f"Icon found for {repo}: {local_path}")
                      except Exception as e:
                          print(f"Error downloading icon for {repo}: {e}")
                  else:
                      selectors = [
                          f".sidebar-icon-{img_prefix} > .menu__link::before",
                          f".sidebar-icon-{img_prefix} > .menu__list-item-collapsible > .menu__link::before"
                      ]
                      dynamic_css += (
                          f"{', '.join(selectors)} {{"
                          f" content: '📦'; background-image: none;"
                          f" width: auto; height: auto; }}\n"
                      )
                      print(f"No icon found for {repo}, using emoji fallback")

                  # Inject className into the root _category_.json for sidebar icons
                  cat_path = pathlib.Path(f"wiki/docs/{prog['category']}/{img_prefix}/_category_.json")
                  if cat_path.exists():
                      cat_data = json.loads(cat_path.read_text(encoding="utf-8"))
                      cat_data["className"] = f"sidebar-icon-{img_prefix}"
                      cat_path.write_text(json.dumps(cat_data), encoding="utf-8")
                      print(f"Injected className into {cat_path}")
              except Exception as e:
                  print(f"Error processing icon for {repo}: {e} — using emoji fallback")
                  selectors = [
                      f".sidebar-icon-{img_prefix} > .menu__link::before",
                      f".sidebar-icon-{img_prefix} > .menu__list-item-collapsible > .menu__link::before"
                  ]
                  dynamic_css += (
                      f"{', '.join(selectors)} {{"
                      f" content: '📦'; background-image: none;"
                      f" width: auto; height: auto; }}\n"
                  )
                  cat_path = pathlib.Path(f"wiki/docs/{prog['category']}/{img_prefix}/_category_.json")
                  if cat_path.exists():
                      cat_data = json.loads(cat_path.read_text(encoding="utf-8"))
                      cat_data["className"] = f"sidebar-icon-{img_prefix}"
                      cat_path.write_text(json.dumps(cat_data), encoding="utf-8")
          
          # Write the dynamic CSS file
          css_out = pathlib.Path("wiki/src/css/icons.css")
          css_out.parent.mkdir(parents=True, exist_ok=True)
          css_out.write_text(dynamic_css, encoding="utf-8")
          print("Dynamic icons.css generated.")

          # Generate tools.json for the wiki home page
          tools_data = []
          for prog in PROGRAMS:
              slug = slugify(prog["repo"])
              cat = prog["category"]
              icon_img = None
              for ext in ["svg", "png", "ico", "jpg", "jpeg", "webp"]:
                  candidate = pathlib.Path(f"wiki/static/img/{slug}/logo_navbar.{ext}")
                  if candidate.exists():
                      icon_img = f"/wiki/img/{slug}/logo_navbar.{ext}"
                      break
              tools_data.append({
                  "name": prog["display_name"],
                  "desc": prog["description"],
                  "link": f"/{cat}/{slug}/",
                  "iconImg": icon_img,
                  "iconEmoji": None if icon_img else "📦",
                  "color": category_color.get(cat, "#ffffff"),
              })
          pathlib.Path("wiki/src/pages/tools.json").write_text(
              json.dumps(tools_data, ensure_ascii=False, indent=2), encoding="utf-8"
          )
          print("Generated tools.json")

          # Generate generated-navbar.json for dynamic navbar ordering
          seen_cats = []
          for item in _topic_config["mappings"]:
              cat = item["category"]
              if cat not in seen_cats:
                  seen_cats.append(cat)

          nav_items = []
          first_cat = True
          for cat in seen_cats:
              if cat not in category_first_slug:
                  continue
              if not first_cat:
                  nav_items.append({
                      "type": "html",
                      "value": "<span class='navbar__separator'>|</span>",
                      "position": "left"
                  })
              nav_items.append({
                  "to": f"/{cat}/{category_first_slug[cat]}/",
                  "position": "left",
                  "label": cat.capitalize()
              })
              first_cat = False
          pathlib.Path("wiki/generated-navbar.json").write_text(
              json.dumps(nav_items, indent=2), encoding="utf-8"
          )
          print("Generated generated-navbar.json")
          PY

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: wiki/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: wiki

      - name: Build Docusaurus
        run: npm run build
        working-directory: wiki

      - name: Generate Portfolio videos.json
        run: python .github/scripts/update_portfolio.py

      - name: Commit portfolio-archive.json and portfolio-recent.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add portfolio-archive.json portfolio-recent.json
          if git diff --staged --quiet; then
            echo "Aucun changement, pas de commit."
          else
            git commit -m "chore: update portfolio archive/recent [skip ci]"
            git push
          fi

      - name: Assemble site
        run: |
          mkdir -p _site/wiki
          cp index.html _site/index.html
          cp Portfolio/favicon.ico _site/favicon.ico
          if [ -d Portfolio ]; then
            mkdir -p _site/Portfolio
            cp -r Portfolio/. _site/Portfolio/
          fi
          cp -r wiki/build/. _site/wiki/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
