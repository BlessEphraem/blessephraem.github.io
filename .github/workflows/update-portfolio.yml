name: Update Portfolio Videos

on:
  push:
    branches: [main]
  schedule:
    # Run automatically every day at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-videos:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp
          
      - name: Run portfolio update script
        run: python .github/scripts/update_portfolio.py
        
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Portfolio/videos.json
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || git commit -m "auto: update portfolio videos from youtube"
          git push
