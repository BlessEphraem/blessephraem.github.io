<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ephraem</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400&display=swap" rel="stylesheet">
    <meta name="description" content="Ephraem — Video editor, developer, and open-source tool builder.">
    <link rel="icon" type="image/x-icon" href="Portfolio/favicon.ico">
    <style>
        :root {
            --primary: #ff1796;
            --secondary: #3ad0ff;
            --bg-dark: #0f1013;
            --bg-card: rgba(30, 32, 40, 0.6);
            --text-main: #ffffff;
            --text-muted: #b0b8c1;
            --glass-border: 1px solid rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            --glow-pink: 0 0 40px rgba(255, 23, 150, 0.3);
            --glow-blue: 0 0 40px rgba(58, 208, 255, 0.3);
            --radius: 20px;
            --transition: all 0.3s ease;
        }

        *:not(i) { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Satoshi', sans-serif !important; 
        }

        i {
            font-family: inherit; /* Laisse Font Awesome gérer ses classes */
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        #page-transition {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 9999;
            pointer-events: none;
            opacity: 1;
            transition: opacity 0.45s ease;
        }
        #page-transition.hidden { opacity: 0; }
        #page-transition.visible { opacity: 1; }

        /* Socials */
        .socials {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 15px;
            font-size: 1.8rem;
        }

        .socials a {
            color: var(--text-muted);
            transition: var(--transition);
            display: inline-block;
        }

        .socials a:hover {
            color: var(--primary);
            transform: translateY(-5px);
        }

        /* Background glow blobs */
        body::before {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 23, 150, 0.08) 0%, transparent 70%);
            top: -100px;
            left: -100px;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(58, 208, 255, 0.06) 0%, transparent 70%);
            bottom: -100px;
            right: -100px;
            pointer-events: none;
        }

        .landing {
            display: flex;
            align-items: center;
            gap: 60px;
            padding: 40px;
            position: relative;
            z-index: 1;
        }

        /* Logo side */
        .logo-side {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 12px;
        }

        .logo-name {
            font-size: clamp(3rem, 6vw, 5.5rem);
            font-family: 'Satoshi', sans-serif !important;
            font-weight: 900 !important;
            letter-spacing: -0.02em;
            line-height: 1;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-tagline {
            font-size: 0.95rem;
            color: var(--text-muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-weight: 400;
        }

        /* Divider */
        .divider {
            width: 1px;
            height: 160px;
            background: linear-gradient(to bottom, transparent, rgba(255, 255, 255, 0.15), transparent);
            flex-shrink: 0;
        }

        /* Button side */
        .btn-side {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 22px 36px;
            border-radius: var(--radius);
            text-decoration: none;
            color: var(--text-main);
            font-size: 1.2rem;
            font-family: 'Satoshi', sans-serif !important;
            font-weight: 900 !important;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            transition: var(--transition);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            min-width: 240px;
            position: relative;
            overflow: hidden;
        }

        .nav-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .nav-btn:hover::before { opacity: 1; }

        .nav-btn-portfolio {
            background: rgba(255, 23, 150, 0.12);
            border: 1px solid rgba(255, 23, 150, 0.35);
            box-shadow: var(--glass-shadow);
        }
        .nav-btn-portfolio::before {
            background: rgba(255, 23, 150, 0.08);
        }
        .nav-btn-portfolio:hover {
            border-color: rgba(255, 23, 150, 0.7);
            box-shadow: var(--glow-pink), var(--glass-shadow);
            transform: translateX(4px);
        }

        .nav-btn-wiki {
            background: rgba(58, 208, 255, 0.10);
            border: 1px solid rgba(58, 208, 255, 0.3);
            box-shadow: var(--glass-shadow);
        }
        .nav-btn-wiki::before {
            background: rgba(58, 208, 255, 0.07);
        }
        .nav-btn-wiki:hover {
            border-color: rgba(58, 208, 255, 0.65);
            box-shadow: var(--glow-blue), var(--glass-shadow);
            transform: translateX(4px);
        }

        .btn-icon {
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .btn-label {
            flex: 1;
        }

        .btn-arrow {
            opacity: 0;
            transform: translateX(-8px);
            transition: var(--transition);
            color: var(--text-muted);
            font-size: 1.1rem;
        }
        .nav-btn:hover .btn-arrow {
            opacity: 1;
            transform: translateX(0);
        }

        /* Portfolio accent color on icon */
        .nav-btn-portfolio .btn-icon { color: var(--primary); }
        .nav-btn-wiki .btn-icon { color: var(--secondary); }

        /* Responsive */
        @media (max-width: 640px) {
            .landing {
                flex-direction: column;
                gap: 40px;
                align-items: center;
                text-align: center;
            }
            .logo-side { align-items: center; }
            .divider {
                width: 120px;
                height: 1px;
                background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.15), transparent);
            }
            .nav-btn { min-width: 200px; }
        }
    </style>
</head>
<body>
    <div id="page-transition"></div>
    <main class="landing">
        <div class="logo-side">
            <span class="logo-name">EPHRAEM</span>
            <span class="logo-tagline">Developer &amp; Creator</span>
        </div>

        <div class="divider"></div>

        <div class="btn-side">
            <a href="./Portfolio/" class="nav-btn nav-btn-portfolio">
                <span class="btn-icon">🎬</span>
                <span class="btn-label">Portfolio</span>
                <span class="btn-arrow">→</span>
            </a>
            <a href="./wiki/" class="nav-btn nav-btn-wiki">
                <span class="btn-icon">📖</span>
                <span class="btn-label">Wiki</span>
                <span class="btn-arrow">→</span>
            </a>
            <div class="socials">
                <a href="https://www.youtube.com/@Eph_raem" target="_blank"><i class="fa-brands fa-youtube"></i></a>
                <a href="https://www.instagram.com/bless_ephraem" target="_blank"><i class="fa-brands fa-instagram"></i></a>
                <a href="https://github.com/BlessEphraem" target="_blank"><i class="fa-brands fa-github"></i></a>
            </div>
        </div>
    </main>
    <script>
        (function() {
            const overlay = document.getElementById('page-transition');

            // Fade in on page load
            if (overlay) {
                requestAnimationFrame(() => {
                    overlay.classList.add('hidden');
                });
            }

            function leaveAndNavigate(url) {
                if (overlay) {
                    overlay.classList.remove('hidden');
                    overlay.classList.add('visible');
                    setTimeout(() => { window.location.href = url; }, 420);
                } else {
                    window.location.href = url;
                }
            }

            document.querySelector('.nav-btn-portfolio')?.addEventListener('click', function(e) {
                e.preventDefault();
                leaveAndNavigate(this.getAttribute('href'));
            });
        })();
    </script>
</body>
</html>
